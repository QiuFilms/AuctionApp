<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="menu" th:fragment="menu">
        <div class="navButtons">
            <a class="auctions nav-btn" th:href="@{/auctions}">Auctions</a>
            <a class="equipment nav-btn" th:href="@{/equipment}">Equipment</a>
        </div>

        <div class="live-stats">
            <p>Live Stats</p>
            <div class="users-count">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span></span> users online
            </div>
            <div class="all-auctions">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg>
                <span></span>auctions active
            </div>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <script>
        const overlay = document.getElementById('menuOverlay');
        if (overlay) {
            overlay.addEventListener('click', () => {
                const menuWrapper = document.querySelector('.eq-insert, .ac-insert');
                if (menuWrapper) menuWrapper.classList.remove('menu-open');
            });
        }
    </script>
