    <script>
        // placeBid korzysta z window.auctionWs i window.subscribeToAuction
        // zdefiniowanych globalnie w fragments/notifications

        function placeBid(bidBtn) {
            const auctionId = parseInt(bidBtn.getAttribute("data-auction-id"));
            const input = document.getElementById("bid-" + auctionId);
            const amount = parseFloat(input.value);

            if (!amount || amount <= 0) {
                showToast("Błąd", "Podaj poprawną kwotę.", "error");
                return;
            }

            // Licytujący automatycznie subskrybuje aukcję
            window.subscribeToAuction(auctionId);

            fetch(`/auctions/${auctionId}/bid?amount=${amount}`, { method: "POST" })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showToast("Oferta złożona!", `Twoja oferta: ${data.newPrice.toFixed(2)} gold`, "success");
                        input.value = "";
                    } else {
                        showToast("Odrzucono", data.error, "error");
                    }
                })
                .catch(() => showToast("Błąd", "Problem z połączeniem.", "error"));
        }

        // Countdown — bez zmian
        function updateCountdowns() {
            document.querySelectorAll(".time-left").forEach(el => {
                const distance = new Date(el.getAttribute("data-end-date")).getTime() - Date.now();
                const timer = el.querySelector(".timer");
                if (distance < 0) {
                    timer.textContent = "EXPIRED";
                } else {
                    const h = Math.floor(distance / 3600000);
                    const m = Math.floor((distance % 3600000) / 60000);
                    const s = Math.floor((distance % 60000) / 1000);
                    timer.textContent = `${h}h ${m}m ${s}s`;
                }
            });
        }
        setInterval(updateCountdowns, 1000);
        updateCountdowns();
    </script>
