<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="header">
    <button class="hamburger" id="hamburgerBtn" aria-label="Otwórz menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="header-left">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFD230" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 3 8 9l4 13 4-13-2.5-6"/><path d="M17 3a2 2 0 0 1 1.6.8l3 4a2 2 0 0 1 .013 2.382l-7.99 10.986a2 2 0 0 1-3.247 0l-7.99-10.986A2 2 0 0 1 2.4 7.8l2.998-3.997A2 2 0 0 1 7 3z"/><path d="M2 9h20"/></svg>
        <p>ARCANE MARKET</p>
    </div>

    <div class="header-right">
        <button class="search-toggle" id="searchToggleBtn" aria-label="Szukaj">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bcbcbc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
        </button>

        <div class="searchBox">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="grey" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
            <input type="search" name="search" id="search" placeholder="Search items...">
        </div>

        <div class="account" th:if="${user != null}">

            <div class="avatar-wrapper" style="position: relative;">
                <div id="avatarIcon">
                    <img th:if="${base64Avatar != ''}"
                         th:src="'data:' + ${user.avatarContentType} + ';base64,' + ${base64Avatar}"
                         style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover; cursor: pointer;"
                         alt="Avatar" />

                    <!-- Domyślna ikona SVG, gdy brak avatara -->
                    <svg th:if="${user.avatar == null || user.avatar.length == 0}"
                         xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>

                <div id="avatarMenu" style="display: none; position: absolute; top: 130%; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid #444; border-radius: 6px; padding: 5px; z-index: 1000; min-width: 140px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);">
                    <button id="uploadAvatarBtn" style="width: 100%; text-align: center; padding: 8px; background: none; border: none; color: #fff; cursor: pointer; font-family: inherit; font-size: 14px; border-bottom: 1px solid #333;">Zmień zdjęcie</button>

                    <a id="downloadAvatarBtn" style="display: block; width: 100%; text-align: center; padding: 8px; color: #fff; text-decoration: none; cursor: pointer; font-size: 14px;">Pobierz</a>
                </div>

                <input type="file" id="avatarFileInput" accept="image/png, image/jpeg, image/gif" style="display: none;">
            </div>
            <div class="info">
                <div class="username" th:text="${user.username}">Nazwa użytkownika</div>
                <div class="wallet">
                    <span th:text="${user.wallet}">0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.744 17.736a6 6 0 1 1-7.48-7.48"/><path d="M15 6h1v4"/><path d="m6.134 14.768.866-.5 2 3.464"/><circle cx="16" cy="8" r="6"/></svg>
                </div>
            </div>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="grey" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
            </button>
        </form>
    </div>

    <div th:insert="~{fragments/notifications :: notifications}"></div>

    <script>
        // --- ISTNIEJĄCY KOD ---
        const searchToggleBtn = document.getElementById('searchToggleBtn');
        const headerEl = document.querySelector('header');
        if (searchToggleBtn && headerEl) {
            searchToggleBtn.addEventListener('click', () => {
                headerEl.classList.toggle('search-open');
                const inp = headerEl.querySelector('#search');
                if (headerEl.classList.contains('search-open') && inp) inp.focus();
            });
        }

        const hamburgerBtn = document.getElementById('hamburgerBtn');
        if (hamburgerBtn) {
            hamburgerBtn.addEventListener('click', () => {
                const wrapper = document.querySelector('main') || document.body;
                const menuWrapper = document.querySelector('.eq-insert, .ac-insert');
                if (menuWrapper) menuWrapper.classList.toggle('menu-open');
            });
        }

        async function fetchWithToken(url, options = {}) {
            // 1. Pobierz token od Springa
            const response = await fetch('/get-token');
            const data = await response.json();

            // 2. Dodaj nagłówek dla Go
            options.headers = {
                ...options.headers,
                'Authorization': 'Bearer ' + data.token
            };

            // 3. Wykonaj właściwe zapytanie do Go
            return fetch(url, options);
        }

        // --- OBSŁUGA AVATARA (UPLOAD & DOWNLOAD PRZEZ API) ---
        const avatarIcon = document.getElementById('avatarIcon');
        const avatarMenu = document.getElementById('avatarMenu');
        const uploadAvatarBtn = document.getElementById('uploadAvatarBtn');
        const downloadAvatarBtn = document.getElementById('downloadAvatarBtn'); // Pobieramy przycisk pobierania
        const avatarFileInput = document.getElementById('avatarFileInput');

        // Funkcja pomocnicza do pobierania tokenu JWT (dostosuj, jeśli trzymasz go w ciasteczku)

        if (avatarIcon && avatarMenu) {
            // Otwieranie/zamykanie menu przy kliknięciu w ikonę
            avatarIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                avatarMenu.style.display = avatarMenu.style.display === 'none' ? 'block' : 'none';
            });

            // Zamykanie menu po kliknięciu gdziekolwiek w tło
            document.addEventListener('click', (e) => {
                if (!avatarIcon.contains(e.target) && !avatarMenu.contains(e.target)) {
                    avatarMenu.style.display = 'none';
                }
            });
        }

        if (uploadAvatarBtn && avatarFileInput) {
            uploadAvatarBtn.addEventListener('click', () => {
                avatarFileInput.click();
                avatarMenu.style.display = 'none';
            });

            avatarFileInput.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const formData = new FormData();
                    formData.append('avatar', file);

                    uploadAvatarBtn.innerText = "Wgrywanie...";

                    // Zapytanie do API w Go (port 8080)
                    fetchWithToken('https://localhost:8080/api/avatar/upload', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => {
                        if (response.ok) {
                            alert('Avatar został zaktualizowany!');
                            window.location.reload();
                        } else {
                            throw new Error('Błąd serwera: ' + response.status);
                        }
                    })
                    .catch(err => {
                        console.error('Błąd wgrywania:', err);
                        alert('Nie udało się wgrać zdjęcia.');
                    });
                }
            });
        }

        // --- 2. DOWNLOAD (Pobieranie) ---
       if (downloadAvatarBtn) {
            downloadAvatarBtn.addEventListener('click', (e) => {
                e.preventDefault();
                avatarMenu.style.display = 'none';

                // Zapytanie do API w Go o plik
                fetchWithToken('https://localhost:8080/api/avatar/download', {
                    method: 'GET'
                })
                .then(async response => {
                    if (!response.ok) {
                        throw new Error('Błąd pobierania: ' + response.status);
                    }

                    // 1. Odczytujemy typ pliku z nagłówka
                    const type = response.headers.get('Content-Type');
                    const extension = type ? type.split('/')[1] : 'png';

                    // 2. Pobieramy zawartość jako blob
                    const blob = await response.blob();

                    // Zwracamy obiekt z oboma parametrami do kolejnego .then()
                    return { blob, extension };
                })
                .then(({ blob, extension }) => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;

                    // Ustawiamy dynamiczną nazwę pliku z odpowiednim rozszerzeniem
                    a.download = `moj_avatar.${extension}`;

                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                })
                .catch(err => {
                    console.error('Błąd pobierania:', err);
                    alert('Nie udało się pobrać avatara.');
                });
            });

        }
    </script>
</header>
</html>
