<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/root.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/auctions.css}">
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <title>Auctions</title>
</head>
<body>
<div th:insert="~{fragments/header :: header}"></div>
<main>
    <div th:insert="~{fragments/menu :: menu}" class="ac-insert"></div>
    <div class="content">

        <div class="filters">
            <select name="rarity" id="rarity">
                <option value="all">All</option>
                <option value="common">Common</option>
                <option value="uncommon">Uncommon</option>
                <option value="rare">Rare</option>
                <option value="epic">Epic</option>
                <option value="legendary">Legendary</option>
            </select>
            <select name="item-type" id="item-type">
                <option value="all">All</option>
                <option value="weapon">⚔️ Weapon</option>
                <option value="armor">🧥 Armor</option>
                <option value="shield">🛡️ Shield</option>
                <option value="potion">🧪 Potion</option>
                <option value="spell">✨ Spell</option>
            </select>
        </div>

        <p class="auctions-count">Showing <span th:text="${auctionsCount}">0</span> auctions</p>

        <div class="offers">
            <div class="offer"
                 th:each="auction : ${auctions}"
                 th:id="'offer-' + ${auction.id}"
                 th:attr="data-rarity=${(auction.item != null) ? auction.item.rarity.toLowerCase() : 'unknown'},
                          data-type=${(auction.item != null and auction.item.type != null) ? auction.item.type.toLowerCase() : 'unknown'}">

                <div class="info">
                    <div class="rarity"
                         th:text="${(auction.item != null) ? auction.item.rarity : 'No Item'}"
                         th:attr="data-type=${(auction.item != null) ? auction.item.rarity.toLowerCase() : 'unknown'}">
                        Rarity
                    </div>

                    <div th:switch="${(auction.item != null and auction.item.type != null) ? auction.item.type.toLowerCase() : 'default'}">
                        <img th:case="'armor'"     th:src="@{/images/abdominal-armor.svg}"  width="100" height="100"/>
                        <img th:case="'weapon'"    th:src="@{/images/bowie-knife.svg}"      width="100" height="100"/>
                        <img th:case="'shield'"    th:src="@{/images/checked-shield.svg}"   width="100" height="100"/>
                        <img th:case="'potion'"    th:src="@{/images/round-potion.svg}"     width="100" height="100"/>
                        <img th:case="'accessory'" th:src="@{/images/gold-shell.svg}"       width="100" height="100"/>
                        <img th:case="*"           th:src="@{/images/default.svg}"          width="100" height="100"/>
                    </div>

                    <div class="watch"
                         th:attr="data-auction-id=${auction.id}"
                         onclick="toggleWatch(this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/>
                        </svg>
                    </div>
                </div>

                <div class="details">
                    <p class="item-name" th:text="${(auction.item != null) ? auction.item.name : 'Unknown Item'}">
                        Item Name
                    </p>
                </div>

                <div class="winning-badge"
                     th:if="${leadingBidders[auction.id] != null and leadingBidders[auction.id] == #authentication.name}">
                    ⚔️ <span>Twoja oferta wygrywa!</span>
                </div>

                <div class="price">
                    Current price:
                    <span>
                        <span th:id="'price-' + ${auction.id}" th:text="${auction.price}">0</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.744 17.736a6 6 0 1 1-7.48-7.48"/><path d="M15 6h1v4"/><path d="m6.134 14.768.866-.5 2 3.464"/><circle cx="16" cy="8" r="6"/></svg>
                    </span>
                </div>

                <div class="offerButtons">
                    <input type="number"
                           th:id="'bid-' + ${auction.id}"
                           placeholder="Your offer..."
                           min="0" step="0.01">
                    <div class="bid" th:attr="data-auction-id=${auction.id}" onclick="placeBid(this)">
                        Place Bid
                    </div>
                </div>

                <p class="bid-message" th:id="'msg-' + ${auction.id}" style="display:none;"></p>

                <p class="time-left countdown" th:attr="data-end-date=${auction.endDate}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    <span class="timer">--:--:--</span>
                </p>
            </div>
        </div>
    </div>
</main>

<footer class="actuator-footer">
    <div class="actuator-info" id="actuator-bar">
        <span>Status: <b id="health-status">...</b></span>
        <span>Pamięć: <b id="memory-usage">--</b></span>
        <span>Java: <b id="java-version">--</b></span>
    </div>
</footer>

<script>
    function placeBid(bidBtn) {
        const auctionId = parseInt(bidBtn.getAttribute("data-auction-id"));
        const input = document.getElementById("bid-" + auctionId);
        const amount = parseFloat(input.value);
        if (!amount || amount <= 0) { showToast("Błąd", "Podaj poprawną kwotę.", "error"); return; }
        window.subscribeToAuction(auctionId);
        fetch(contextPath + `/auctions/${auctionId}/bid?amount=${amount}`, { method: "PUT" })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast("Oferta złożona!", `Twoja oferta: ${parseFloat(data.newPrice).toFixed(2)} gold`, "success");
                    input.value = "";
                    setWinningBadge(auctionId, true);
                } else {
                    showToast("Odrzucono", data.error, "error");
                }
            })
            .catch(() => showToast("Błąd", "Problem z połączeniem.", "error"));
    }

    function setWinningBadge(auctionId, isWinning) {
        const offerEl = document.getElementById("offer-" + auctionId);
        if (!offerEl) return;
        offerEl.querySelector(".winning-badge")?.remove();
        if (isWinning) {
            const badge = document.createElement("div");
            badge.className = "winning-badge";
            badge.innerHTML = `⚔️ <span>Twoja oferta wygrywa!</span>`;
            const buttons = offerEl.querySelector(".offerButtons");
            if (buttons) offerEl.insertBefore(badge, buttons);
        }
    }

    function updateCountdowns() {
        document.querySelectorAll('.time-left').forEach(element => {
            const endDateStr = element.getAttribute('data-end-date');
            const distance = new Date(endDateStr).getTime() - Date.now();
            const span = element.querySelector('.timer');
            if (distance < 0) { span.textContent = "EXPIRED"; return; }
            const h = Math.floor(distance / 3600000);
            const m = Math.floor((distance % 3600000) / 60000);
            const s = Math.floor((distance % 60000) / 1000);
            span.textContent = `${h}h ${m}m ${s}s`;
        });
    }
    setInterval(updateCountdowns, 1000);
    updateCountdowns();

    document.addEventListener("DOMContentLoaded", () => {
        const raritySelect = document.getElementById("rarity");
        const typeSelect   = document.getElementById("item-type");
        const searchInput  = document.getElementById("search");

        function filterItems() {
            const rv = raritySelect.value.toLowerCase();
            const tv = typeSelect.value.toLowerCase();
            const sv = searchInput ? searchInput.value.toLowerCase() : "";
            document.querySelectorAll(".offer").forEach(offer => {
                const rarity = offer.getAttribute("data-rarity") || "";
                const type   = offer.getAttribute("data-type") || "";
                const name   = offer.querySelector(".item-name").textContent.toLowerCase();
                const ok = (rv === "all" || rarity === rv)
                        && (tv === "all" || type === tv)
                        && name.includes(sv);
                offer.style.display = ok ? "flex" : "none";
            });
        }

        raritySelect.addEventListener("change", filterItems);
        typeSelect.addEventListener("change", filterItems);
        if (searchInput) searchInput.addEventListener("input", filterItems);
    });
</script>
</body>
</html>
