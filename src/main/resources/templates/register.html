<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/root.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <title>Register — Arcane Market</title>
</head>
<body>
    <header>
        <div class="header-left">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFD230" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 3 8 9l4 13 4-13-2.5-6"/><path d="M17 3a2 2 0 0 1 1.6.8l3 4a2 2 0 0 1 .013 2.382l-7.99 10.986a2 2 0 0 1-3.247 0l-7.99-10.986A2 2 0 0 1 2.4 7.8l2.998-3.997A2 2 0 0 1 7 3z"/><path d="M2 9h20"/></svg>
            <p>ARCANE MARKET</p>
        </div>
    </header>

    <main>
        <div class="outer-container">
            <div class="inner-container">
                <h2>Register</h2>
                <form th:action="@{/register}" method="post">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="new-password">
                    </div>
                    <button type="submit" id="registerButton">Register</button>
                </form>
                <div th:if="${error}" class="error">
                    <p th:text="${error}"></p>
                </div>
                <p>
                    Already have an account? <a th:href="@{/login}">Log in here.</a>
                </p>
            </div>
        </div>
    </main>

    <footer></footer>

    <script defer>
        document.addEventListener("DOMContentLoaded", function() {
            const form = document.querySelector('form');
            const btn  = document.getElementById('registerButton');
            if (form && btn) {
                form.addEventListener('submit', function() {
                    btn.disabled = true;
                    btn.innerText = "Registering...";
                });
            }
        });
    </script>
</body>
</html>
